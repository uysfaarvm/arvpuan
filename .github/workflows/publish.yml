name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write
      attestations: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Araclari kur
        run: pip install build pyarmor

      - name: Kodu obfuscate et
        run: |
          pyarmor gen --output dist_obf arvpuanv1/
          Copy-Item pyproject_obf.toml dist_obf/pyproject.toml
          Copy-Item README.md dist_obf/README.md
          Copy-Item -Recurse dist_obf/pyarmor_runtime_000000 dist_obf/arvpuanv1/pyarmor_runtime_000000

      - name: Paketi derle
        run: python -m build dist_obf

      - name: PyPI'ye yukle
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist_obf/dist/
